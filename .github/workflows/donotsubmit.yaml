name: Do Not Submit

on:
  pull_request:
    branches: ['main']

permissions: {}

jobs:
  donotsubmit:
    name: Do Not Submit
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        persist-credentials: false

    - uses: chainguard-dev/actions/donotsubmit@49ad80032a18b41a4812d7799939a90a9b8b7d01 # main
